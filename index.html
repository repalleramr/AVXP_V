<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>avxp Baccarat Engine</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#0b0b0b">
</head>
<body>
    <div class="container">
        <header>
            <h1>avxp <span>Tactical</span></h1>
            <span id="connection-status">Shoe Active</span>
        </header>

        <div class="ai-panel">
            <div class="ai-header">Shoe Composition Data</div>
            <div class="ai-metrics">
                <div class="ai-metric-box">
                    <span class="stat-label">Cards Remaining</span>
                    <span class="stat-value" id="cards-left">416</span>
                </div>
                <div class="ai-metric-box">
                    <span class="stat-label">Net Profit (Cycle Rule)</span>
                    <span class="stat-value neutral" id="net-profit">+0 U</span>
                </div>
            </div>
        </div>

        <div class="keypad-section">
            <div class="keypad-grid">
                <button class="key-btn" data-val="1">1</button>
                <button class="key-btn" data-val="2">2</button>
                <button class="key-btn" data-val="3">3</button>
                <button class="key-btn" data-val="4">4</button>
                <button class="key-btn" data-val="5">5</button>
                <button class="key-btn" data-val="6">6</button>
                <button class="key-btn" data-val="7">7</button>
                <button class="key-btn" data-val="8">8</button>
                <button class="key-btn" data-val="9">9</button>
                <button class="key-btn zero-btn" data-val="0">0 (10, J, Q, K)</button>
            </div>
        </div>

        <div class="controls action-controls">
            <button id="undo-btn" class="secondary-btn" disabled>Undo Card</button>
            <button id="reset-shoe-btn" class="danger-btn">New Shoe</button>
        </div>

        <div class="history-section">
            <h3>Current Shoe History</h3>
            <div id="history-grid" class="history-grid"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
