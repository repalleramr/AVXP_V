<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>avxp Baccarat Engine</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#0b0b0b">
</head>
<body>
    <div class="container">
        <header>
            <h1>avxp <span>Tactical</span></h1>
            <span id="connection-status">Shoe Active</span>
        </header>

        <div id="winner-toast" class="winner-toast"></div>

        <div class="ai-panel">
            <div class="ai-header">Tactical Prediction Engine</div>
            <div class="ai-metrics">
                <div class="ai-metric-box">
                    <span class="stat-label">Method 01 (Composition)</span>
                    <span class="stat-value" id="method1-target">Wait...</span>
                </div>
                <div class="ai-metric-box">
                    <span class="stat-label">Method 02 (Pattern)</span>
                    <span class="stat-value" id="method2-target">Wait...</span>
                </div>
            </div>
            <div style="text-align: center; margin-top: 10px;">
                <span class="ai-confidence" id="ai-confidence">Cards Left: 416</span>
            </div>
        </div>

        <div class="live-hand-section">
            <h3 id="prompt-text" class="prompt-text">Awaiting: Player Card 1</h3>
            <div class="hand-display">
                <div class="hand-box player-hand">
                    <span>PLAYER</span>
                    <div id="player-cards" class="cards-area">-</div>
                    <div id="player-score" class="score-area">0</div>
                </div>
                <div class="hand-box banker-hand">
                    <span>BANKER</span>
                    <div id="banker-cards" class="cards-area">-</div>
                    <div id="banker-score" class="score-area">0</div>
                </div>
            </div>
        </div>

        <div class="keypad-section">
            <div class="keypad-grid">
                <button class="key-btn" data-val="A">A</button>
                <button class="key-btn" data-val="2">2</button>
                <button class="key-btn" data-val="3">3</button>
                <button class="key-btn" data-val="4">4</button>
                
                <button class="key-btn" data-val="5">5</button>
                <button class="key-btn" data-val="6">6</button>
                <button class="key-btn" data-val="7">7</button>
                <button class="key-btn" data-val="8">8</button>
                
                <button class="key-btn" data-val="9">9</button>
                <button class="key-btn face-btn" data-val="10">10</button>
                <button class="key-btn face-btn" data-val="J">J</button>
                <button class="key-btn face-btn" data-val="Q">Q</button>
                
                <button class="key-btn face-btn" style="grid-column: span 4;" data-val="K">K</button>
            </div>
        </div>

        <div class="controls action-controls">
            <button id="cancel-hand-btn" class="secondary-btn">Cancel Hand</button>
            <button id="reset-shoe-btn" class="danger-btn">New Shoe</button>
        </div>

        <div class="history-section">
            <h3>Shoe Board (Winners)</h3>
            <div id="history-grid" class="history-grid"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
